blueprint:
  name: IKEA RODRET Dimmer – Light Control
  description: |
    Steuert eine oder mehrere Lampen mit dem IKEA E2201 RODRET Dimmer.
    Unterstützt Zigbee2MQTT, ZHA und deCONZ.
    Controller und Light-Hook in einer einzigen Automation vereint.
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input:
    controller_device:
      name: Controller Device
      description: Der RODRET Dimmer aus der Geräteliste.
      default: ''
      selector:
        device:
          filter:
            - integration: mqtt
              manufacturer: IKEA
              model: RODRET wireless dimmer/power switch
            - integration: mqtt
              manufacturer: IKEA
              model: RODRET wireless dimmer/power switch (E2201)
            - integration: zha
              manufacturer: IKEA of Sweden
              model: RODRET Dimmer
            - integration: deconz
              manufacturer: IKEA of Sweden
              model: RODRET Dimmer
          multiple: false
    lights:
      name: Lampe(n)
      description: Eine oder mehrere Lampen, die gesteuert werden sollen.
      selector:
        entity:
          domain: light
          multiple: true
    light_transition:
      name: Übergangszeit (ms)
      description: Zeit in Millisekunden für Ein-/Ausblenden.
      default: 250
      selector:
        number:
          min: 0
          max: 5000
          step: 50
          unit_of_measurement: ms
          mode: slider
    min_brightness:
      name: Minimale Helligkeit
      default: 1
      selector:
        number:
          min: 1
          max: 255
          step: 1
          unit_of_measurement: brightness
          mode: slider
    max_brightness:
      name: Maximale Helligkeit
      default: 255
      selector:
        number:
          min: 1
          max: 255
          step: 1
          unit_of_measurement: brightness
          mode: slider
    brightness_steps_long:
      name: Dimm-Schritte (Lang-Druck)
      description: Anzahl Schritte von Min bis Max beim Halten der Taste.
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: box
    force_brightness:
      name: Helligkeit beim Einschalten erzwingen
      default: false
      selector:
        boolean:
    on_brightness:
      name: Helligkeit beim Einschalten
      description: Nur relevant wenn "Helligkeit erzwingen" aktiv ist.
      default: 255
      selector:
        number:
          min: 1
          max: 255
          step: 1
          unit_of_measurement: brightness
          mode: slider
    smooth_power_on:
      name: Sanftes Einschalten
      description: Beim Dimmen aufwärts aus dem Aus-Zustand auf Mindesthelligkeit starten.
      default: true
      selector:
        boolean:
    smooth_power_off:
      name: Sanftes Ausschalten
      description: Beim Dimmen abwärts auf Mindesthelligkeit automatisch ausschalten.
      default: true
      selector:
        boolean:
    helper_long_press_delay:
      name: Long-Press Verzögerung (ms)
      description: Maximale Zeit zwischen Drücken und Loslassen für einen Long-Press.
      default: 250
      selector:
        number:
          min: 100
          max: 5000
          step: 10
          unit_of_measurement: ms
          mode: box
    button_long_max_loop_repeats:
      name: Maximale Dimm-Wiederholungen
      description: Sicherheitslimit für die Dimm-Schleife beim Halten der Taste.
      default: 20
      selector:
        number:
          min: 1
          max: 1000
          step: 1
          mode: slider

variables:
  lights: !input lights
  light_transition: !input light_transition
  min_brightness: !input min_brightness
  max_brightness: !input max_brightness
  brightness_steps_long: !input brightness_steps_long
  force_brightness: !input force_brightness
  on_brightness: !input on_brightness
  smooth_power_on: !input smooth_power_on
  smooth_power_off: !input smooth_power_off
  helper_long_press_delay: !input helper_long_press_delay
  step_long: "{{ (max_brightness - min_brightness) / brightness_steps_long }}"

mode: restart
max_exceeded: silent

triggers:
  # Zigbee2MQTT
  - trigger: device
    id: z2m-button-up-short
    domain: mqtt
    device_id: !input controller_device
    type: action
    subtype: 'on'
  - trigger: device
    id: z2m-button-up-long
    domain: mqtt
    device_id: !input controller_device
    type: action
    subtype: brightness_move_up
  - trigger: device
    id: z2m-button-up-release
    domain: mqtt
    device_id: !input controller_device
    type: action
    subtype: brightness_stop
  - trigger: device
    id: z2m-button-down-short
    domain: mqtt
    device_id: !input controller_device
    type: action
    subtype: 'off'
  - trigger: device
    id: z2m-button-down-long
    domain: mqtt
    device_id: !input controller_device
    type: action
    subtype: brightness_move_down
  - trigger: device
    id: z2m-button-down-release
    domain: mqtt
    device_id: !input controller_device
    type: action
    subtype: brightness_stop
  # ZHA
  - trigger: event
    id: zha-button-up-short
    event_type: zha_event
    event_data:
      device_id: !input controller_device
      command: 'on'
      endpoint_id: 1
      cluster_id: 6
  - trigger: event
    id: zha-button-up-long
    event_type: zha_event
    event_data:
      device_id: !input controller_device
      command: move_with_on_off
      endpoint_id: 1
      cluster_id: 8
  - trigger: event
    id: zha-button-up-release
    event_type: zha_event
    event_data:
      device_id: !input controller_device
      command: stop_with_on_off
      endpoint_id: 1
      cluster_id: 8
  - trigger: event
    id: zha-button-down-short
    event_type: zha_event
    event_data:
      device_id: !input controller_device
      command: 'off'
      endpoint_id: 1
      cluster_id: 6
  - trigger: event
    id: zha-button-down-long
    event_type: zha_event
    event_data:
      device_id: !input controller_device
      command: move
      endpoint_id: 1
      cluster_id: 8
  - trigger: event
    id: zha-button-down-release
    event_type: zha_event
    event_data:
      device_id: !input controller_device
      command: stop
      endpoint_id: 1
      cluster_id: 8
  # deCONZ
  - trigger: event
    id: dcz-button-up-short
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
      event: '1002'
  - trigger: event
    id: dcz-button-up-long
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
      event: '1001'
  - trigger: event
    id: dcz-button-up-release
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
      event: '1003'
  - trigger: event
    id: dcz-button-down-short
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
      event: '2002'
  - trigger: event
    id: dcz-button-down-long
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
      event: '2001'
  - trigger: event
    id: dcz-button-down-release
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
      event: '2003'

conditions: []

actions:
  - choose:
      # Einschalten (Oben kurz)
      - conditions:
          - condition: trigger
            id:
              - z2m-button-up-short
              - zha-button-up-short
              - dcz-button-up-short
        sequence:
          - choose:
              - conditions: "{{ force_brightness }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: !input lights
                    data:
                      brightness: !input on_brightness
                      transition: "{{ light_transition / 1000 }}"
            default:
              - action: light.turn_on
                target:
                  entity_id: !input lights
                data:
                  transition: "{{ light_transition / 1000 }}"

      # Ausschalten (Unten kurz)
      - conditions:
          - condition: trigger
            id:
              - z2m-button-down-short
              - zha-button-down-short
              - dcz-button-down-short
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input lights
            data:
              transition: "{{ light_transition / 1000 }}"

      # Heller (Oben halten)
      - conditions:
          - condition: trigger
            id:
              - z2m-button-up-long
              - zha-button-up-long
              - dcz-button-up-long
        sequence:
          - choose:
              - conditions: >
                  {{ expand(lights) | selectattr('state','eq','off') | list | count ==
                  expand(lights) | list | count and not smooth_power_on }}
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: !input lights
                    data:
                      transition: "{{ light_transition / 1000 }}"
                  - delay:
                      milliseconds: !input light_transition
              - conditions: >
                  {{ expand(lights) | selectattr('state','eq','off') | list | count ==
                  expand(lights) | list | count and smooth_power_on }}
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: !input lights
                    data:
                      brightness: "{{ min_brightness }}"
                      transition: "{{ light_transition / 1000 }}"
                  - delay:
                      milliseconds: !input light_transition
          - repeat:
              count: !input button_long_max_loop_repeats
              sequence:
                - parallel:
                    - sequence:
                        - action: light.turn_on
                          target:
                            entity_id: !input lights
                          data:
                            brightness: >
                              {{ [[expand(lights) | selectattr('state','eq','on')
                              | map(attribute='attributes.brightness') | list | average | int(0)
                              + step_long, min_brightness] | max, max_brightness] | min }}
                            transition: 0.25
                    - sequence:
                        - wait_for_trigger:
                            - trigger: device
                              domain: mqtt
                              device_id: !input controller_device
                              type: action
                              subtype: brightness_stop
                            - trigger: event
                              event_type: zha_event
                              event_data:
                                device_id: !input controller_device
                                command: stop_with_on_off
                            - trigger: event
                              event_type: deconz_event
                              event_data:
                                device_id: !input controller_device
                                event: '1003'
                          timeout:
                            milliseconds: !input helper_long_press_delay
                          continue_on_timeout: true
                        - if:
                            - condition: template
                              value_template: "{{ wait.trigger.idx is defined }}"
                          then:
                            - stop: button_up_released

      # Dunkler (Unten halten)
      - conditions:
          - condition: trigger
            id:
              - z2m-button-down-long
              - zha-button-down-long
              - dcz-button-down-long
        sequence:
          - repeat:
              count: !input button_long_max_loop_repeats
              sequence:
                - parallel:
                    - sequence:
                        - choose:
                            - conditions: >
                                {{ smooth_power_off and
                                expand(lights) | selectattr('state','eq','on')
                                | map(attribute='attributes.brightness') | list | average | int(0) <= min_brightness }}
                              sequence:
                                - action: light.turn_off
                                  target:
                                    entity_id: !input lights
                                  data:
                                    transition: "{{ light_transition / 1000 }}"
                          default:
                            - action: light.turn_on
                              target:
                                entity_id: !input lights
                              data:
                                brightness: >
                                  {{ [[expand(lights) | selectattr('state','eq','on')
                                  | map(attribute='attributes.brightness') | list | average | int(0)
                                  - step_long, min_brightness] | max, max_brightness] | min }}
                                transition: 0.25
                    - sequence:
                        - wait_for_trigger:
                            - trigger: device
                              domain: mqtt
                              device_id: !input controller_device
                              type: action
                              subtype: brightness_stop
                            - trigger: event
                              event_type: zha_event
                              event_data:
                                device_id: !input controller_device
                                command: stop
                            - trigger: event
                              event_type: deconz_event
                              event_data:
                                device_id: !input controller_device
                                event: '2003'
                          timeout:
                            milliseconds: !input helper_long_press_delay
                          continue_on_timeout: true
                        - if:
                            - condition: template
                              value_template: "{{ wait.trigger.idx is defined }}"
                          then:
                            - stop: button_down_released
